# Context Manifest
# - SSOT content is maintained outside this manifest, under the directory specified by content_root.
# - This manifest defines only the essentials: structure, tags, and presets.
#
# Convention
# - content_root points to the SSOT content directory.
# - Source paths are implicit. For each file entry, the source file path is derived as:
#     "{content_root}/{dir}/{name}"  (dir may be empty)
# - Source-relative paths are resolved relative to the directory containing this manifest.

version: 1

root_dir: ".context"
content_root: "context"

sections:
  # root directory
  - dir: ""
    tags: [core]
    files:
      # _INDEX.md is intentionally omitted here, it is generated at runtime, offers a dynamic TOC and serves as an entry point for AI agents
      - name: "ai_protocol.md"
        tags: []

  - dir: "product"
    tags: [product]
    files:
      - name: "vision.md"
        tags: [global]
      - name: "roadmap.md"
        tags: []
      - name: "features.md"
        tags: []
      - name: "glossary.md"
        tags: [global]

  - dir: "standards"
    tags: [standards]
    files:
      - name: "project_conventions.md"
        tags: [global]
      - name: "styleguide.md"
        tags: []
        gateway: true
      - name: "naming.md"
        tags: []
      - name: "version_control.md"
        tags: [vcs, git]
      - name: "tech_stack.md"
        tags: []
      - name: "infrastructure.md"
        tags: [infra, platform]
      - name: "integrations.md"
        tags: [third-party]
      - name: "security.md"
        tags: []
      - name: "compliance.md"
        tags: []
      - name: "testing.md"
        tags: []
      - name: "observability.md"
        tags: [logging, monitoring, alerting]
      - name: "analytics.md"
        tags: [tracking, experimentation]

  - dir: "architecture"
    tags: [architecture]
    files:
      - name: "system_overview.md"
        tags: [global]
      - name: "data_model.md"
        tags: []
      - name: "data_pipeline.md"
        tags: []
      - name: "api_contracts.md"
        tags: []
    children:
      - dir: "adr"
        tags: [adr]
        files:
          - name: "adr_index.md"
            tags: [decision]
            gateway: true
          - name: "adr_template.md"
            tags: [template]

  - dir: "workflows"
    tags: [workflow]
    files:
      - name: "task_template.md"
        tags: [template]
      - name: "feature_dev.md"
        tags: []
      - name: "code_review.md"
        tags: []
      - name: "test_execution.md"
        tags: []
      - name: "continuous_integration.md"
        tags: [ci]
      - name: "deployment.md"
        tags: [release]
      - name: "localization.md"
        tags: [i18n, l10n]

  - dir: "prompts"
    tags: [prompt]
    files:
      - name: "session_init.md"
        tags: []
      - name: "review_prompt.md"
        tags: []

presets:
  # mode: include -> include files whose effective tags match preset tags
  # mode: full    -> include all files (no tag filtering)
  minimal:
    mode: include
    tags: [core]

  standard:
    mode: include
    tags: [core, product, standards, architecture, workflow]

  full:
    mode: full
